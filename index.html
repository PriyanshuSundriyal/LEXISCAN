<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEXISCAN - C Lexical Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>LEXISCAN</h1>
            <p>C Language Lexical Analyzer</p>
        </header>

        <main>
            <div class="upload-section">
                <label for="file-input" class="file-label">
                    <span class="file-icon">📁</span>
                    Choose File (.c / .txt)
                </label>
                <input type="file" id="file-input" accept=".c,.txt">
                <span id="file-name">No file selected</span>
            </div>

            <button id="analyze-btn" disabled>Perform Lexical Analysis</button>

            <div id="output-section" class="hidden">
                <h2>Analysis Results</h2>
                <div id="output-content"></div>
                <button id="download-btn">Download output.txt</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
